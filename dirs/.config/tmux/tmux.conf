# -- general -------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on
set -g history-limit 5000

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g renumber-windows on

set -g set-titles on
set -g set-titles-string "#h ❐ #S ● #I #W"

set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10

set -g monitor-activity on
set -g visual-activity off

# -- terminal features ---------------------------------------------------------

set -as terminal-features ",xterm-256color:RGB:hyperlinks"
set -as terminal-features ",xterm-ghostty:RGB:hyperlinks"
set -as terminal-features "xterm*:extkeys"
set -g extended-keys on
set -g xterm-keys on
set -g allow-passthrough on

# -- prefix / input ------------------------------------------------------------

set -g prefix C-s
unbind C-b
bind C-s send-prefix
set -g mouse on

# -- navigation ----------------------------------------------------------------

# sessions
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'
bind BTab switch-client -l

# windows
unbind n
unbind p
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window
bind -r C-S-H swap-window -t -1\; select-window -t -1
bind -r C-S-L swap-window -t +1\; select-window -t +1

# splits (retain current path)
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"

# pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind > swap-pane -D
bind < swap-pane -U

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# -- copy mode -----------------------------------------------------------------

bind Enter copy-mode
setw -g mode-keys vi
set -g status-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# OSC 52 clipboard
set -g set-clipboard on

# buffers
bind p paste-buffer -p
bind P choose-buffer

# -- custom bindings -----------------------------------------------------------

bind C-i display-popup -w 90% -h 90% -d "#{pane_current_path}" -E ipython
bind C-g display-popup -w 90% -h 90% -d "#{pane_current_path}" -E lazygit
unbind C-z
bind r source-file "~/.config/tmux/tmux.conf" \; display "Config reloaded"
bind b run-shell '~/.config/tmux/select-bell-window.sh'
bind m set -g mouse \; display "mouse #{?mouse,on,off}"

# -- theme (dracula) -----------------------------------------------------------

set -g @drac_bg "#282a36"
set -g @drac_sel "#44475a"
set -g @drac_comment "#6272a4"
set -g @drac_fg "#f8f8f2"
set -g @drac_cyan "#8be9fd"
set -g @drac_yellow "#f1fa8c"
set -g @drac_purple "#bd93f9"
set -g @drac_pink "#ff79c6"
set -g @drac_green "#50fa7b"
set -g @drac_red "#ff5555"

# pane borders
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " [#{pane_index}] #{pane_title} "
set -g pane-border-style "fg=#{@drac_sel}"
set -g pane-active-border-style "#{?pane_in_mode,fg=#{@drac_purple},#{?synchronize-panes,fg=#{@drac_red},fg=#{@drac_cyan}}}"

# status bar
set -g status-style "fg=#{@drac_comment},bg=#{@drac_bg}"
set -g status-left-length 40
set -g status-right-length 150

set -g status-left "#{?client_prefix,#[fg=#{@drac_bg}]#[bg=#{@drac_yellow}]#[bold],#[fg=#{@drac_bg}]#[bg=#{@drac_green}]#[bold]}  #S #[default] "

set -g status-right "#(s=\$HOME/ws/gh/wateret/agent-tools/misc/cc-yolo/tmux-status.sh; test -x \$s && \$s --turns --sessions) #[fg=#{@drac_pink},bg=#{@drac_sel}] #{host_short} #[fg=#{@drac_sel},bg=#{@drac_fg}] 󰍛#{cpu_percentage} #{ram_percentage} "

# window tabs
set -g window-status-format "#{?window_bell_flag,#[fg=#{@drac_yellow}],#[fg=#{@drac_fg}]}#[bg=#{@drac_sel}] #[bold]#I#[nobold] #W#{?window_zoomed_flag, 󰍉,}#{?window_bell_flag, ,}#{claude_status} "
set -g window-status-current-format "#[fg=#{@drac_bg},bg=#5ab3c8,bold] #I #W#{?window_zoomed_flag, 󰍉,}#{?window_bell_flag, ,}#{claude_status} "
set -g window-status-activity-style "fg=default,bg=#{@drac_sel}"
set -g window-status-bell-style "fg=#{@drac_yellow},bg=default,blink,bold"
set -g window-status-last-style "fg=#{@drac_cyan},bg=#{@drac_sel}"
set -g window-status-separator " "

# message and mode
set -g message-style "fg=#{@drac_bg},bg=#{@drac_yellow},bold"
set -g message-command-style "fg=#{@drac_yellow},bg=#{@drac_bg},bold"
set -g mode-style "fg=#{@drac_bg},bg=#{@drac_yellow},bold"

# clock
set -g clock-mode-colour "#8be9fd"
set -g clock-mode-style 24

# pane indicators (prefix + q)
set -g display-panes-colour "#44475a"
set -g display-panes-active-colour "#8be9fd"

# -- hooks ---------------------------------------------------------------------

set-hook -g after-resize-pane "run-shell -b '$HOME/.config/tmux/delta-resize.sh #{pane_id}'"

# -- plugins (TPM) -------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-mem'
set -g @plugin 'wateret/tmux-resurrect-agents'
set -g @plugin 'wateret/tmux-claude-status'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '60'
set -g @continuum-status-on ''
set -g @continuum-status-off ''
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @cpu_percentage_format '%3.0f%%'
set -g @ram_percentage_format '%3.0f%%'
set -g @claude_status_icon '󰚩'

# auto-install TPM on first run
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
